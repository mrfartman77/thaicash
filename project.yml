name: ThaiCash
options:
  bundleIdPrefix: com.thaicash
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: "YES"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
    INFOPLIST_KEY_CFBundleDisplayName: "ThaiCash"
targets:
  ThaiCash:
    type: application
    platform: iOS
    sources:
      - App
      - Models
      - Engine
      - Services
      - Views
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thaicash.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  ThaiCashTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: ThaiCash
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thaicash.tests
schemes:
  ThaiCash:
    build:
      targets:
        ThaiCash: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ThaiCashTests
